<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Franchise - Oya Kakers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <style>
        .store-parallax {
            position: relative;
            height: 50vh;
            background: url("images/stores/pexels-abdullahoguk-36526733.jpg") center/cover fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .store-parallax::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .parallax-content {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
        }

        .parallax-content h1 {
            position: relative;
            display: inline-block;
            font-size: 40px;
            font-family: 'Playfair Display', serif;
            color: white;
        }

        .parallax-content h1::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -5px;
            transform: translateX(-50%);

            width: 60%;
            height: 2px;

            background: linear-gradient(to right, transparent, #D4AF37, transparent);

            transition: 0.4s ease;
        }

        .parallax-content h1:hover::after {
            width: 80%;
        }

        .parallax-content p {
            margin-top: 20px;
            font-size: 16px;
        }

        .fp-btn {
            margin-top: 15px;
            display: inline-block;
            padding: 14px 32px;
            background: #D4AF37;
            color: #2B1B17;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
        }

        .fp-btn:hover {
            background: #c59b2f;
            transform: translateY(-3px);
        }

        .store-locator {
            padding: 100px 5%;
            color: #3E2723;
        }

        .store-locator h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        #searchBox {
            display: block;
            margin: 0 auto 30px;
            padding: 12px 20px;
            width: 300px;
            border-radius: 30px;
            border: none;
            outline: none;
        }

        .locator-container {
            display: flex;
            gap: 20px;
        }

        .store-list {
            width: 40%;
            max-height: 500px;
            overflow-y: auto;
        }

        .store-card {
            background: #fff;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .store-card:hover {
            background: #D4AF37;
            color: white;
        }

        #map {
            width: 60%;
            height: 500px;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div id="navbar"></div>

    <section class="store-parallax">
        <div class="parallax-content">
            <h1>Find an OYA Kekars Near You</h1>
            <p>Locate your nearest store and experience our freshly crafted premium cakes</p>
        </div>
    </section>

    <section class="store-locator">

        <h1>Find Our Stores</h1>

        <input type="text" id="searchBox" placeholder="Search by city or area">

        <div class="locator-container">

            <div class="store-list" id="storeList"></div>

            <div id="map"></div>

        </div>

    </section>

    <div class="fab-container">
        <div class="fab-main" onclick="toggleMenu()">
            <i id="fabIcon" class="fas fa-comment-dots"></i>
        </div>

        <div class="fab-options">
            <a href="tel:+919876543210" class="fab-item">
                <i class="fas fa-phone"></i>
                <span>Call Now</span>
            </a>

            <a href="franchise.html" class="fab-item">
                <i class="fas fa-store"></i>
                <span>Franchise</span>
            </a>

            <a href="https://wa.me/919876543210" target="_blank" class="fab-item whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
        </div>
    </div>

    <div id="footer"></div>

    <script src="js/script.js" defer></script>

    <script>
        const stores = [
            {
                name: "OYA KEKARS (Main Branch)",
                location: "Hadapsar, Pune",
                phone: "+91 9823230505",
                lat: 18.5089,
                lng: 73.9260
            },
            {
                name: "OYA KEKARS",
                location: "Koregaon Park, Pune",
                phone: "+91 7720088005",
                lat: 18.5362,
                lng: 73.8939
            },
            {
                name: "OYA KEKARS",
                location: "Tilekarnagar, Pune",
                phone: "+91 9921216202",
                lat: 18.4960,
                lng: 73.9410
            },
            {
                name: "OYA KEKARS",
                location: "Nanded City, Pune",
                phone: "+91 8698000408",
                lat: 18.4575,
                lng: 73.7927
            },
            {
                name: "OYA KEKARS",
                location: "Rajarampuri, Kolhapur",
                phone: "+91 7750707581",
                lat: 16.7000,
                lng: 74.2330
            },
            {
                name: "OYA KEKARS",
                location: "Kharadi, Pune",
                phone: "+91 9168630505",
                lat: 18.5515,
                lng: 73.9475
            }
        ];

        let map;
        let markers = [];

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 7,
                center: { lat: 18.5204, lng: 73.8567 },
                styles: [
                    { elementType: "geometry", stylers: [{ color: "#1d1d1d" }] },
                    { elementType: "labels.text.stroke", stylers: [{ color: "#1d1d1d" }] },
                    { elementType: "labels.text.fill", stylers: [{ color: "#ffffff" }] }
                ]
            });

            loadStores(stores);
        }

        function loadStores(data) {
            const list = document.getElementById("storeList");
            list.innerHTML = "";

            markers.forEach(m => m.setMap(null));
            markers = [];

            data.forEach(store => {
                const div = document.createElement("div");
                div.className = "store-card";
                div.innerHTML = `
            <h3>${store.name}</h3>
            <p>${store.location}</p>
            <p>${store.phone}</p>
        `;
                list.appendChild(div);

                const marker = new google.maps.Marker({
                    position: { lat: store.lat, lng: store.lng },
                    map,
                    title: store.name
                });

                markers.push(marker);

                div.addEventListener("click", () => {
                    map.setCenter(marker.getPosition());
                    map.setZoom(14);
                });
            });
        }

        document.getElementById("searchBox").addEventListener("input", function () {
            const value = this.value.toLowerCase();

            const filtered = stores.filter(store =>
                store.location.toLowerCase().includes(value)
            );

            loadStores(filtered);
        });
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDRvPaMDxyDqUQzWDzmQEV0YGhbVqk0rbI&callback=initMap" async defer></script>

</body>

</html>
