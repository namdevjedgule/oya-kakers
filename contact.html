<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact - Oya Kakers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="navbar"></div>

    <section class="contact-section">

        <div class="contact-header">
            <h1>Contact Us</h1>
            <p>We’d love to make your celebrations sweeter 💛</p>
        </div>

        <div class="contact-container">

            <div class="contact-form">
                <h2>Send a Message</h2>

                <div class="input-group">
                    <input type="text" required>
                    <label>Your Name</label>
                </div>

                <div class="input-group">
                    <input type="email" required>
                    <label>Email Address</label>
                </div>

                <div class="input-group">
                    <input type="text" required>
                    <label>Phone Number</label>
                </div>

                <div class="input-group">
                    <textarea required></textarea>
                    <label>Your Message</label>
                </div>

                <button class="contact-btn">Send Message</button>
            </div>

            <div class="contact-info">
                <h2>Get in Touch</h2>

                <p>📍 Pune, Maharashtra</p>
                <p>📞 +91 98765 43210</p>
                <p>📧 oyakekars@gmail.com</p>

                <div class="contact-socials">
                    <a href="https://www.instagram.com/oya_kekars_/" target="_blank">Instagram</a>
                    <a href="#">Facebook</a>
                    <a href="#">WhatsApp</a>
                </div>

                <iframe src="https://maps.google.com/maps?q=Pune%2C%20Maharashtra&z=13&output=embed" frameborder="0"
                    loading="lazy">
                </iframe>

            </div>

        </div>

    </section>

    <div id="footer"></div>

    <script src="js/script.js"></script>

</body>

</html>
