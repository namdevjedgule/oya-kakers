<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact - Oya Kakers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-parallax {
            position: relative;
            height: 50vh;
            background: url("images/contact/pexels-piotr-arnoldes-7862031-6783183.jpg") center/cover fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-parallax::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .parallax-content {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
        }

        .parallax-content h1 {
            position: relative;
            display: inline-block;
            font-size: 40px;
            font-family: 'Playfair Display', serif;
            color: white;
        }

        .parallax-content h1::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -5px;
            transform: translateX(-50%);

            width: 60%;
            height: 2px;

            background: linear-gradient(to right, transparent, #D4AF37, transparent);

            transition: 0.4s ease;
        }

        .parallax-content h1:hover::after {
            width: 80%;
        }

        .parallax-content p {
            margin-top: 20px;
            font-size: 16px;
        }

        .contact-section {
            padding: 80px 8%;
            font-family: 'Poppins', sans-serif;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .contact-header h1 {
            font-size: 42px;
            font-family: 'Playfair Display', serif;
            color: #3E2723;
        }

        .contact-header p {
            color: #6d4c41;
        }

        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }

        .contact-form {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .contact-form h2 {
            margin-bottom: 20px;
            color: #3E2723;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            outline: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .input-group textarea {
            height: 100px;
        }

        .input-group label {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #888;
            font-size: 13px;
            pointer-events: none;
            transition: 0.3s;
            background: white;
            padding: 0 5px;
        }

        .input-group input:focus+label,
        .input-group input:valid+label,
        .input-group textarea:focus+label,
        .input-group textarea:valid+label {
            top: -8px;
            font-size: 11px;
            color: #D4AF37;
        }

        .contact-btn {
            width: 100%;
            padding: 12px;
            background: #3E2723;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: #D4AF37;
            color: #3E2723;
        }

        .contact-info {
            padding: 40px;
        }

        .contact-info h2 {
            margin-bottom: 20px;
            color: #3E2723;
        }

        .contact-info p {
            margin-bottom: 10px;
            color: #5d4037;
        }

        .contact-socials {
            margin: 20px 0;
        }

        .contact-socials a {
            margin-right: 15px;
            text-decoration: none;
            color: #3E2723;
            font-weight: 500;
            transition: 0.3s;
        }

        .contact-socials a:hover {
            color: #D4AF37;
        }

        .contact-info iframe {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="navbar"></div>

    <section class="contact-parallax">
        <div class="parallax-content">
            <h1>Contact Us</h1>
            <p>We’d love to make your celebrations sweeter 💛</p>
        </div>
    </section>

    <section class="contact-section">

        <div class="contact-container">

            <div class="contact-form">
                <h2>Send a Message</h2>

                <div class="input-group">
                    <input type="text" required>
                    <label>Your Name</label>
                </div>

                <div class="input-group">
                    <input type="email" required>
                    <label>Email Address</label>
                </div>

                <div class="input-group">
                    <input type="text" required>
                    <label>Phone Number</label>
                </div>

                <div class="input-group">
                    <textarea required></textarea>
                    <label>Your Message</label>
                </div>

                <button class="contact-btn">Send Message</button>
            </div>

            <div class="contact-info">
                <h2>Get in Touch</h2>

                <p>📍 Pune, Maharashtra</p>
                <p>📞 +91 98765 43210</p>
                <p>📧 oyakekars@gmail.com</p>

                <div class="contact-socials">
                    <a href="https://www.instagram.com/oya_kekars_/" target="_blank">Instagram</a>
                    <a href="#">Facebook</a>
                    <a href="#">WhatsApp</a>
                </div>

                <iframe src="https://maps.google.com/maps?q=Pune%2C%20Maharashtra&z=13&output=embed" frameborder="0"
                    loading="lazy">
                </iframe>

            </div>

        </div>

    </section>

    <div class="fab-container">
        <div class="fab-main" onclick="toggleMenu()">
            <i id="fabIcon" class="fas fa-comment-dots"></i>
        </div>

        <div class="fab-options">
            <a href="tel:+919876543210" class="fab-item">
                <i class="fas fa-phone"></i>
                <span>Call Now</span>
            </a>

            <a href="franchise.html" class="fab-item">
                <i class="fas fa-store"></i>
                <span>Franchise</span>
            </a>

            <a href="https://wa.me/919876543210" target="_blank" class="fab-item whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
        </div>
    </div>

    <div id="footer"></div>

    <script src="js/script.js" defer></script>

</body>

</html>
