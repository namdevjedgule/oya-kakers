    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .cake-parallax {
            position: relative;
            height: 50vh;
            background: url("images/cake/pexels-shivam-pandey-91521863-29450335.jpg") center/cover fixed;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cake-parallax::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .parallax-content {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .parallax-content h1 {
            position: relative;
            display: inline-block;
            font-size: 40px;
            font-family: 'Playfair Display', serif;
            color: white;
        }

        .parallax-content h1::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -5px;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
            transition: 0.4s ease;
        }

        .parallax-content h1:hover::after {
            width: 80%;
        }

        .parallax-content p {
            margin-top: 20px;
            font-size: 16px;
        }

        .cake-page {
            padding: 40px 4%;
            font-family: 'Poppins', sans-serif;
        }

        .cake-filter {
            text-align: center;
            margin-bottom: 40px;
        }

        .cake-filter button {
            padding: 10px 20px;
            margin: 5px;
            border: 1px solid #8F7265;
            background: #EDCDC2;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        .cake-filter button.active,
        .cake-filter button:hover {
            background: #D4AF37;
            color: #3E2723;
        }

        .insta-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            /* desktop: 4 per row */
            gap: 15px;
        }

        .insta-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 12px;
            background: #f0e8e0;
        }

        .insta-item img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }


        .insta-item:hover {
            opacity: 0;
        }

        .insta-item:hover {
            opacity: 1;
        }

        .insta-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            opacity: 0;
            transition: 0.4s ease;
            z-index: 2;
        }

        .insta-item:hover .insta-overlay {
            opacity: 1;
        }

        .insta-overlay h3 {
            color: white;
            font-size: 18px;
            margin-bottom: 4px;
        }

        .insta-overlay span {
            color: #D4AF37;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
            font-size: 15px;
        }

        .insta-overlay button {
            padding: 7px 18px;
            border: none;
            border-radius: 20px;
            background: #D4AF37;
            color: #3E2723;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
            align-self: flex-start;
        }

        .insta-overlay button:hover {
            background: white;
        }

        .insta-like {
            position: absolute;
            top: 12px;
            right: 12px;
            color: white;
            font-size: 18px;
            opacity: 0;
            transition: 0.3s;
            z-index: 3;
            cursor: pointer;
        }

        .insta-item:hover .insta-like {
            opacity: 1;
        }

        .insta-like:hover {
            color: #ff4d6d;
            transform: scale(1.2);
        }

        @media (max-width: 1024px) {
            .insta-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }

            .cake-page {
                padding: 32px 3%;
            }
        }

        @media (max-width: 992px) {

            .fp-parallax {
                height: 40vh;
                background-attachment: scroll;
            }

            .parallax-content h1 {
                font-size: 30px;
            }

            .parallax-content p {
                font-size: 14px;
                margin-top: 12px;
            }
        }

        @media (max-width: 768px) {
            .cake-parallax {
                height: 35vh;
                background-attachment: scroll;
            }

            .parallax-content h1 {
                font-size: 28px;
            }

            .parallax-content p {
                font-size: 14px;
            }

            .cake-page {
                padding: 24px 3%;
            }

            .cake-filter {
                margin-bottom: 24px;
            }

            .cake-filter button {
                padding: 8px 14px;
                font-size: 12px;
                margin: 4px;
            }

            .insta-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .insta-overlay {
                opacity: 1;
                background: linear-gradient(to top, rgba(0, 0, 0, 0.65) 0%, transparent 60%);
                padding: 10px;
            }

            .insta-overlay span {
                font-size: 13px;
                margin-bottom: 5px;
            }

            .insta-overlay button {
                padding: 5px 12px;
                font-size: 11px;
            }

            .insta-like {
                opacity: 1;
                font-size: 15px;
                top: 8px;
                right: 8px;
            }
        }

        @media (max-width: 480px) {
            .cake-parallax {
                height: 30vh;
            }

            .parallax-content h1 {
                font-size: 20px;
            }

            .parallax-content p {
                font-size: 12px;
            }

            .cake-page {
                padding: 20px 3%;
            }

            .cake-filter button {
                padding: 7px 12px;
                font-size: 11px;
                margin: 3px;
            }

            .insta-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .insta-overlay {
                padding: 8px;
            }

            .insta-overlay span {
                font-size: 12px;
                margin-bottom: 4px;
            }

            .insta-overlay button {
                padding: 4px 10px;
                font-size: 10px;
            }

            .insta-like {
                font-size: 14px;
                top: 6px;
                right: 6px;
            }
        }

        @media (max-width: 360px) {
            .insta-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }

            .cake-page {
                padding: 16px 2%;
            }

            .insta-overlay button {
                display: none;
            }
        }
    </style>
</head>
